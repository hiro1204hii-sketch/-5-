<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住宅概算・原価管理システム</title>
<style>
  :root{
    --brand:#2563eb; --brand-d:#1d4ed8; --brand-l:#eff4ff;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f1f5f9; --card:#fff;
    --ok:#059669; --okbg:#ecfdf5; --warn:#d97706; --warnbg:#fffbeb; --red:#dc2626; --redbg:#fef2f2;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  a{color:inherit}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .side{position:fixed;left:0;top:0;width:236px;height:100vh;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;z-index:20}
  .brand{display:flex;gap:10px;align-items:center;padding:16px 18px}
  .brand .logo{width:36px;height:36px;border-radius:9px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
  .brand b{font-size:14px}.brand small{display:block;color:#94a3b8;font-size:10px;font-weight:400}
  .nav{flex:1;overflow:auto;padding:6px 10px}
  .nav .sec{padding:14px 10px 4px;font-size:10px;letter-spacing:.08em;color:#94a3b8;font-weight:700}
  .nav a{display:flex;gap:10px;align-items:center;padding:8px 10px;border-radius:9px;color:#475569;font-weight:600;text-decoration:none;cursor:pointer;font-size:13px}
  .nav a .ic{width:20px;text-align:center}
  .nav a:hover{background:#f1f5f9}
  .nav a.on{background:var(--brand-l);color:var(--brand-d)}
  .side .foot{border-top:1px solid #f1f5f9;padding:10px 18px;color:#94a3b8;font-size:10px}
  /* main */
  .main{margin-left:236px;flex:1;min-width:0}
  .wrap{max-width:1160px;margin:0 auto;padding:26px 30px}
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px}
  .head h1{font-size:20px;margin:0}
  .head p{margin:5px 0 0;color:var(--muted);font-size:13px;max-width:760px}
  /* ui bits */
  .btn{display:inline-flex;align-items:center;gap:6px;border:0;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn.pri{background:var(--brand);color:#fff}.btn.pri:hover{background:var(--brand-d)}
  .btn.gh{background:#fff;border:1px solid var(--line);color:#334155}.btn.gh:hover{background:#f8fafc}
  .btn.dn{background:#fff;border:1px solid #fecaca;color:var(--red)}.btn.dn:hover{background:var(--redbg)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .lnk{color:var(--brand-d);cursor:pointer;font-weight:600;font-size:12px}
  .lnk:hover{text-decoration:underline}
  .lnk.red{color:var(--red)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card .ct{padding:12px 18px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .pad{padding:18px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;color:var(--muted);font-weight:700;padding:10px 12px;background:#f8fafc;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;white-space:nowrap}
  tr:hover td{background:#fafcff}
  tfoot td{background:#f8fafc;font-weight:700}
  .r{text-align:right}.c{text-align:center}.mut{color:var(--muted)}
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .b-gray{background:#f1f5f9;color:#475569}.b-blue{background:var(--brand-l);color:var(--brand-d)}
  .b-ok{background:var(--okbg);color:var(--ok)}.b-warn{background:var(--warnbg);color:var(--warn)}
  .b-red{background:var(--redbg);color:var(--red)}.b-vio{background:#f5f3ff;color:#7c3aed}.b-sky{background:#e0f2fe;color:#0369a1}
  input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-l)}
  label.f{display:block}
  label.f span{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
  .grid{display:grid;gap:12px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600}
  .stat .v{font-size:28px;font-weight:800;margin-top:4px}
  .stat .s{font-size:11px;color:#94a3b8;margin-top:2px}
  .empty{padding:40px;text-align:center;color:#94a3b8;font-size:13px}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px;z-index:40}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:86vh;overflow:auto}
  .modal.wide{max-width:820px}
  .modal .mt{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #f1f5f9}
  .modal .mt b{font-size:15px}.modal .x{cursor:pointer;color:#94a3b8;font-size:18px;border:0;background:none}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;color:#475569;font-size:12px;font-weight:600;cursor:pointer}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .opt{cursor:pointer;border:1px solid var(--line);background:#fff;color:#475569;border-radius:999px;padding:5px 11px;font-size:12px;font-weight:600}
  .opt.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand-d)}
  .note{background:var(--warnbg);color:#92400e;border-radius:8px;padding:9px 12px;font-size:12px}
  .scroll{max-height:380px;overflow:auto}
  @media(max-width:880px){.side{transform:translateX(-100%);transition:.2s}.side.open{transform:none}.main{margin-left:0}.menubtn{display:inline-flex!important}}
  .menubtn{display:none}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side">
    <div class="brand"><div class="logo">概</div><div><b>住宅概算・原価管理</b><small>スタンドアロン版 / Phase1</small></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot"><div>目的: 概算精度の継続的向上</div><div id="foot" style="margin-top:4px">保存先: このブラウザ内</div></div>
  </aside>
  <main class="main">
    <div class="wrap">
      <button class="btn gh sm menubtn" onclick="document.getElementById('side').classList.toggle('open')" style="margin-bottom:12px">☰ メニュー</button>
      <div id="view"></div>
    </div>
  </main>
</div>
<div id="modal-root"></div>

<script>
/* =========================================================================
   住宅概算・原価管理システム  — スタンドアロン(1ファイル)版
   データはブラウザの localStorage に保存。サーバー不要。
   ========================================================================= */
const LS_KEY = 'hes_standalone_v4';
const yen = n => '¥' + Math.round(Number(n||0)).toLocaleString('ja-JP');
const yens = n => (n>=0?'+':'−') + '¥' + Math.abs(Math.round(n)).toLocaleString('ja-JP');
const num = n => Number(n||0).toLocaleString('ja-JP');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid = (()=>{let i=Date.now();return ()=>++i})();
const todayISO = ()=>new Date().toISOString();
const dAgo = n => new Date(Date.now()-n*864e5).toISOString();

const TSUBO = 3.305785; // 1坪 = 3.305785㎡
const LEVELNAME = {1:'大項目',2:'中項目',3:'小項目①',4:'小項目②',5:'小項目③'};
const BASE_SOURCES = {
  floor_area:'延床面積（㎡）', building_area:'建築面積（㎡）', site_area:'敷地面積（㎡）',
  floor_tsubo:'延床面積（坪）', building_tsubo:'建築面積（坪）', site_tsubo:'敷地面積（坪）',
  rooms:'部屋数', floors:'階数', fixed1:'一式（固定1）', manual:'数量手入力'
};
const GRADES = [{k:'standard',l:'標準'},{k:'high',l:'上位'},{k:'premium',l:'最上位'}];
const CATS = ['キッチン','浴室','洗面','トイレ','給湯器','換気','エアコン','建具','フローリング','外壁','屋根'];

/* ---------------- seed / empty ---------------- */
function basesDefaults(){
  const U={floor_area:'㎡',building_area:'㎡',site_area:'㎡',floor_tsubo:'坪',building_tsubo:'坪',site_tsubo:'坪',rooms:'室',floors:'階',fixed1:'式',manual:''};
  return Object.keys(BASE_SOURCES).map(src=>({id:uid(),name:BASE_SOURCES[src],source:src,unit:U[src],builtin:1}));
}
function emptyDB(){return {customers:[],properties:[],bases:basesDefaults(),workItems:[],priceHistory:[],equipment:[],options:[],specSets:[],estimates:[],pastEstimates:[]};}
function seed(){
  const bases = basesDefaults();
  const B = src => (bases.find(b=>b.source===src)||{}).id;
  // [工種名, 単位, 業者単価, 掛け率, 掛ける相手source]  →  売価単価 = 業者単価 × 掛け率
  const groups = [
    ['仮設工事',[['共通仮設',[['仮設足場','㎡',950,1.25,'floor_area'],['養生・clean','式',60000,1.30,'fixed1']]]]],
    ['基礎工事',[['土工事',[['地盤改良','式',480000,1.25,'fixed1']]],['基礎躯体',[['ベタ基礎','㎡',22000,1.27,'building_area']]]]],
    ['木工事',[['躯体',[['構造材・建方','㎡',33000,1.27,'floor_area']]],['造作',[['造作工事','㎡',14000,1.28,'floor_area']]]]],
    ['屋根工事',[['屋根',[['ガルバリウム屋根','㎡',7200,1.30,'building_area']]]]],
    ['外壁工事',[['外壁',[['窯業系サイディング','㎡',8500,1.29,'floor_area']]]]],
    ['防水工事',[['防水',[['バルコニー防水','式',90000,1.30,'fixed1']]]]],
    ['建具工事',[['内部建具',[['内部建具','室',50000,1.30,'rooms']]],['外部建具',[['サッシ・玄関ドア','式',660000,1.28,'fixed1']]]]],
    ['内装工事',[['仕上',[['クロス工事','㎡',1100,1.35,'floor_area'],['フローリング','㎡',6500,1.30,'floor_area']]]]],
    ['電気工事',[['電気',[['電気配線・器具','㎡',5000,1.30,'floor_area']]]]],
    ['給排水工事',[['給排水',[['給排水衛生設備','式',740000,1.28,'fixed1']]]]],
    ['設備工事',[['空調換気',[['空調・換気設備','式',430000,1.28,'fixed1']]]]],
    ['外構工事',[['外構',[['外構・造園','㎡',9000,1.33,'manual']]]]],
    ['諸経費',[['経費',[['現場管理費','坪',8000,1.0,'floor_tsubo'],['一般管理費','式',800000,1.0,'fixed1']]]]],
  ];
  const workItems=[]; let so=0;
  groups.forEach(([gname,middles])=>{
    const mid1=uid(); workItems.push({id:mid1,parent_id:null,level:1,name:gname,sort:so++,note:''});
    let ms=0;
    middles.forEach(([mname,leaves])=>{
      const mid2=uid(); workItems.push({id:mid2,parent_id:mid1,level:2,name:mname,sort:ms++,note:''});
      let ls=0;
      leaves.forEach(([name,unit,vendor,markup,src])=>workItems.push({id:uid(),parent_id:mid2,level:3,name,unit,base_id:B(src),vendor_price:vendor,markup,sort:ls++,note:'',updated_at:todayISO()}));
    });
  });
  const priceHistory=[];
  workItems.filter(w=>w.level===3).slice(0,8).forEach(it=>{
    const o=Math.round(it.vendor_price*.9);
    priceHistory.push({id:uid(),work_item_id:it.id,name:it.name,old_price:o,new_price:it.vendor_price,old_cost:o,new_cost:it.vendor_price,reason:'資材価格高騰による改定',changed_at:dAgo(40)});
  });
  const E=(category,maker,product_name,grade,is_standard,list_price,cost,sale_price,install_cost)=>({id:uid(),category,maker,product_name,grade,is_standard,list_price,cost,sale_price,install_cost,note:''});
  const equipment=[
    E('キッチン','LIXIL','シエラS','standard',1,950000,520000,800000,80000),
    E('キッチン','Panasonic','ラクシーナ','high',0,1300000,720000,1100000,90000),
    E('キッチン','クリナップ','STEDIA','premium',0,1800000,1000000,1500000,100000),
    E('浴室','TOTO','サザナ','standard',1,900000,480000,720000,120000),
    E('浴室','LIXIL','スパージュ','premium',0,1500000,820000,1250000,130000),
    E('洗面','LIXIL','ピアラ','standard',1,180000,95000,150000,30000),
    E('洗面','Panasonic','シーライン','high',0,280000,150000,230000,32000),
    E('トイレ','TOTO','ピュアレストQR','standard',1,150000,80000,125000,25000),
    E('トイレ','TOTO','ネオレスト','premium',0,400000,230000,360000,28000),
    E('給湯器','リンナイ','エコジョーズ','standard',1,250000,140000,210000,20000),
    E('給湯器','ダイキン','エコキュート','high',0,600000,360000,520000,40000),
    E('換気','Panasonic','第1種熱交換換気','standard',1,350000,200000,300000,50000),
    E('エアコン','ダイキン','壁掛けエアコン','standard',1,150000,90000,130000,20000),
    E('建具','LIXIL','ラシッサD','standard',1,0,0,0,0),
    E('フローリング','朝日ウッドテック','挽板フローリング','standard',1,0,0,0,0),
    E('外壁','ニチハ','Fu-ge','standard',1,0,0,0,0),
    E('屋根','ニチハ','ガルバ横葺','standard',1,0,0,0,0),
  ];
  const O=(category,name,cost,sale_price)=>({id:uid(),category,name,cost,sale_price,note:''});
  const options=[
    O('キッチン','深型食洗機',70000,120000),O('キッチン','タッチレス水栓',35000,60000),O('キッチン','カップボード',180000,280000),
    O('キッチン','天板変更(セラミック)',120000,200000),O('キッチン','レンジフード変更',45000,80000),
    O('浴室','浴室暖房乾燥機',90000,150000),O('浴室','手すり',12000,25000),O('浴室','窓追加',40000,70000),
    O('トイレ','タンクレス化',130000,220000),O('トイレ','手洗い器',55000,95000),O('洗面','三面鏡収納',30000,55000),
  ];
  const stdCats=['キッチン','浴室','洗面','トイレ','外壁','屋根'];
  const mkSet=(name,note)=>({id:uid(),name,note,items:stdCats.map(c=>{const e=equipment.find(x=>x.category===c&&x.is_standard);return{category:c,equipment_id:e?e.id:null}})});
  const specSets=[mkSet('SW標準仕様','SW工法 標準パッケージ'),mkSet('一般標準仕様','一般工法 標準パッケージ')];
  const customers=[
    {id:uid(),name:'山田 太郎',kana:'ヤマダ タロウ',phone:'090-1234-5678',email:'yamada@example.com',address:'長野県松本市〇〇1-2-3',note:'紹介客',created_at:dAgo(40)},
    {id:uid(),name:'佐藤 花子',kana:'サトウ ハナコ',phone:'080-2222-3333',email:'',address:'長野県塩尻市△△4-5',note:'二世帯希望',created_at:dAgo(30)},
    {id:uid(),name:'鈴木 一郎',kana:'スズキ イチロウ',phone:'070-4444-5555',email:'suzuki@example.com',address:'長野県安曇野市□□6-7',note:'',created_at:dAgo(22)},
  ];
  const properties=[
    {id:uid(),customer_id:customers[0].id,name:'A様邸 新築工事',total_floor_area:105.2,building_area:58.4,site_area:165,floors:2,rooms:4,is_two_household:0,is_sw:1,insulation_grade:6,seismic_grade:2,is_long_life:1,is_gx:1,note:'SW工法・長期優良',created_at:dAgo(5)},
    {id:uid(),customer_id:customers[1].id,name:'B様邸 二世帯住宅',total_floor_area:142.6,building_area:78.2,site_area:210.5,floors:2,rooms:6,is_two_household:1,is_sw:1,insulation_grade:6,seismic_grade:3,is_long_life:1,is_gx:0,note:'二世帯',created_at:dAgo(12)},
    {id:uid(),customer_id:customers[2].id,name:'C様邸 平屋プラン',total_floor_area:88,building_area:88,site_area:200,floors:1,rooms:3,is_two_household:0,is_sw:0,insulation_grade:5,seismic_grade:2,is_long_life:0,is_gx:0,note:'平屋',created_at:dAgo(20)},
  ];
  const pe=(p,fa,wi,d,q,up,date)=>({id:uid(),property_name:p,total_floor_area:fa,work_item:wi,detail:d,quantity:q,unit_price:up,amount:q*up,created_date:date});
  const pastEstimates=[
    pe('過去物件1',102,'基礎工事','ベタ基礎',56,25000,'2024-04-10'),pe('過去物件2',110,'基礎工事','ベタ基礎',60,26500,'2024-09-15'),
    pe('過去物件3',98,'基礎工事','ベタ基礎',54,28000,'2025-02-20'),pe('過去物件4',120,'基礎工事','ベタ基礎',66,29000,'2025-11-05'),
    pe('過去物件1',102,'木工事','構造材・建方',102,38000,'2024-04-10'),pe('過去物件2',110,'木工事','構造材・建方',110,40000,'2024-09-15'),
    pe('過去物件3',98,'木工事','構造材・建方',98,41500,'2025-02-20'),pe('過去物件4',120,'木工事','構造材・建方',120,43000,'2025-11-05'),
    pe('過去物件1',102,'外壁工事','窯業系サイディング',180,9800,'2024-04-10'),pe('過去物件2',110,'外壁工事','窯業系サイディング',195,10500,'2024-09-15'),
    pe('過去物件3',98,'外壁工事','窯業系サイディング',170,11000,'2025-02-20'),
    pe('過去物件1',102,'内装工事','クロス工事',320,1350,'2024-04-10'),pe('過去物件2',110,'内装工事','クロス工事',350,1450,'2024-09-15'),
    pe('過去物件3',98,'内装工事','クロス工事',300,1500,'2025-02-20'),
  ];
  return {customers,properties,bases,workItems,priceHistory,equipment,options,specSets,estimates:[],pastEstimates};
}

/* ---------------- store ---------------- */
let DB;
function ensureArrays(){ ['customers','properties','bases','workItems','priceHistory','equipment','options','specSets','estimates','pastEstimates'].forEach(k=>{if(!Array.isArray(DB[k]))DB[k]=k==='bases'?basesDefaults():[];}); }
function load(){
  try{const r=localStorage.getItem(LS_KEY);if(r){DB=JSON.parse(r);}}catch(e){DB=null;}
  if(!DB){DB=emptyDB();}        // 初回は空の状態で開始（サンプルは入れない）
  ensureArrays(); ensureSort(); saveLocal();
}
function saveLocal(){ localStorage.setItem(LS_KEY,JSON.stringify(DB)); }
function save(){ saveLocal(); scheduleFileWrite(); }   // ブラウザ保存＋（設定時は）ファイルへ自動保存
function clearAll(){ if(confirm('顧客・物件・工事項目・住設・オプション・標準仕様・概算・過去見積をすべて削除して空にします。よろしいですか？（取り消せません）')){DB=emptyDB();save();state.view='dashboard';specSel=null;render();} }
function loadSample(){ if(confirm('現在のデータを置き換えて、動作確認用のサンプルデータを読み込みます。よろしいですか？')){DB=seed();ensureSort();save();state.view='dashboard';specSel=null;render();} }

/* ---------------- パソコンのファイルに保存 (File System Access API) ---------------- */
const FSA = (typeof window!=='undefined') && ('showSaveFilePicker' in window);
let fileHandle=null, autoSave=false, pendingReconnect=false, _fwT=null;
function idbReq(fn){return new Promise((res,rej)=>{const o=indexedDB.open('hes_fs',1);o.onupgradeneeded=()=>o.result.createObjectStore('h');o.onsuccess=()=>fn(o.result,res,rej);o.onerror=()=>rej(o.error);});}
function idbSet(k,v){return idbReq((db,res,rej)=>{const t=db.transaction('h','readwrite');t.objectStore('h').put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function idbGet(k){return idbReq((db,res,rej)=>{const t=db.transaction('h','readonly');const r=t.objectStore('h').get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function idbDel(k){return idbReq((db,res,rej)=>{const t=db.transaction('h','readwrite');t.objectStore('h').delete(k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function scheduleFileWrite(){ if(!autoSave||!fileHandle)return; clearTimeout(_fwT); _fwT=setTimeout(fileWrite,400); }
async function fileWrite(){ if(!fileHandle)return; try{const w=await fileHandle.createWritable();await w.write(JSON.stringify(DB,null,2));await w.close();}catch(e){console.warn('file write',e);} }
async function fileSaveAs(){
  if(!FSA){ exportData(); return; }
  try{
    const h=await window.showSaveFilePicker({suggestedName:'住宅概算データ.json',types:[{description:'JSONデータ',accept:{'application/json':['.json']}}]});
    fileHandle=h; autoSave=true; pendingReconnect=false; try{await idbSet('handle',h);}catch(e){}
    await fileWrite();
    alert('保存先ファイルを設定しました。これ以降の変更は自動でこのファイルに保存されます。');
    render();
  }catch(e){ if(e&&e.name==='AbortError')return; alert('直接保存が使えなかったため、ダウンロード方式に切り替えます。'); exportData(); }
}
async function fileOpen(){
  if(!FSA){ document.getElementById('jsonfile').click(); return; }
  try{
    const [h]=await window.showOpenFilePicker({types:[{description:'JSONデータ',accept:{'application/json':['.json']}}]});
    const o=JSON.parse(await (await h.getFile()).text());
    if(typeof o!=='object'||(!o.workItems&&!o.customers&&!o.properties))throw new Error('住宅概算データのファイルではないようです');
    DB=o; ensureArrays(); fileHandle=h; autoSave=true; pendingReconnect=false; try{await idbSet('handle',h);}catch(e){}
    saveLocal();
    alert('ファイルを開きました。これ以降の変更は自動でこのファイルに保存されます。');
    state.view='dashboard'; specSel=null; render();
  }catch(e){ if(e&&e.name==='AbortError')return; alert('開けませんでした: '+e.message); }
}
async function fileReconnectClick(){
  if(!fileHandle){ try{fileHandle=await idbGet('handle');}catch(e){} }
  if(!fileHandle){ alert('保存先ファイルが設定されていません。'); return; }
  try{
    const p=await fileHandle.requestPermission({mode:'readwrite'});
    if(p!=='granted'){ alert('ファイルへのアクセスが許可されませんでした。'); return; }
    const o=JSON.parse(await (await fileHandle.getFile()).text()); DB=o; ensureArrays(); saveLocal();
    autoSave=true; pendingReconnect=false;
    alert('保存先ファイルに再接続しました。'); state.view='dashboard'; specSel=null; render();
  }catch(e){ alert('再接続できませんでした: '+e.message); }
}
async function fileDisconnect(){ autoSave=false; fileHandle=null; pendingReconnect=false; try{await idbDel('handle');}catch(e){} alert('ファイル保存を解除しました（以降はブラウザ内のみ保存）。'); render(); }
async function fileBoot(){
  if(!FSA)return;
  try{ const h=await idbGet('handle'); if(!h)return; fileHandle=h;
    const p=await h.queryPermission({mode:'readwrite'});
    if(p==='granted'){ try{const o=JSON.parse(await (await h.getFile()).text());DB=o;ensureArrays();saveLocal();}catch(e){} autoSave=true; }
    else { pendingReconnect=true; }
    render();
  }catch(e){}
}
function updateFoot(){
  const f=document.getElementById('foot'); if(!f)return;
  if(autoSave&&fileHandle) f.innerHTML='保存先: 💾 ファイルに自動保存中';
  else if(pendingReconnect) f.innerHTML='保存先: ⚠ ファイル未接続 <span class="lnk" style="color:#93c5fd" onclick="fileReconnectClick()">再接続</span>';
  else f.innerHTML='保存先: このブラウザ内';
}

/* ---------------- calc engine（業者単価 × 掛け率） ---------------- */
function majorOf(item){let p=item,g=0;while(p&&p.level>1&&g++<20){p=DB.workItems.find(x=>x.id===p.parent_id);}return p||item;}
function baseOf(id){return DB.bases.find(b=>b.id===id);}
function baseValue(base,p,manualQty,itemId){
  if(!base)return 1;
  switch(base.source){
    case 'floor_area': return p.total_floor_area||0;
    case 'building_area': return p.building_area||0;
    case 'site_area': return p.site_area||0;
    case 'floor_tsubo': return (p.total_floor_area||0)/TSUBO;
    case 'building_tsubo': return (p.building_area||0)/TSUBO;
    case 'site_tsubo': return (p.site_area||0)/TSUBO;
    case 'rooms': return p.rooms||0;
    case 'floors': return p.floors||0;
    case 'fixed1': return 1;
    case 'manual': return (manualQty||{})[itemId]||0;
    default: return 1;
  }
}
function isLeaf(w){return !DB.workItems.some(c=>c.parent_id===w.id);}
function calcWorkLine(p,it,manualQty){
  const base=baseOf(it.base_id);
  const vendor=it.vendor_price||0, markup=(it.markup==null?1:it.markup);
  const qty=baseValue(base,p,manualQty,it.id);
  const unitSale=vendor*markup;
  return {quantity:Math.round(qty*100)/100, unit:it.unit||(base?base.unit:'')||'', base_name:base?base.name:'—',
    vendor_price:Math.round(vendor), markup, unit_sale:Math.round(unitSale), amount:Math.round(qty*unitSale), cost_amount:Math.round(qty*vendor), is_manual:!!(base&&base.source==='manual')};
}
function buildBreakdown(input){
  const p=DB.properties.find(x=>x.id===input.property_id);
  if(!p) return null;
  // 集計対象 = 末端(子を持たない) かつ 掛ける相手が設定された工種
  const leaves=DB.workItems.filter(w=>isLeaf(w)&&w.base_id);
  let workSale=0,workCost=0;
  const workLines=leaves.map(it=>{
    const r=calcWorkLine(p,it,(input.manualQty||{}));
    workSale+=r.amount;workCost+=r.cost_amount;
    return {work_item_id:it.id,category:(majorOf(it)||{}).name||'',work_item_name:it.name,unit:r.unit,base_name:r.base_name,
      quantity:r.quantity,vendor_price:r.vendor_price,markup:r.markup,unit_sale:r.unit_sale,amount:r.amount,cost_amount:r.cost_amount,is_manual:r.is_manual};
  });
  const set=input.spec_set_id?DB.specSets.find(s=>s.id===input.spec_set_id):null;
  const stdByCat={}; if(set) set.items.forEach(i=>stdByCat[i.category]=i.equipment_id);
  const cats=new Set([...Object.keys(stdByCat),...Object.keys(input.equipment||{})]);
  const eqById=id=>id?DB.equipment.find(e=>e.id===id):null;
  const selOpts=(input.options||[]).map(id=>DB.options.find(o=>o.id===id)).filter(Boolean);
  const optLines=selOpts.map(o=>({category:o.category,option_id:o.id,option_name:o.name,cost:o.cost,sale_price:o.sale_price}));
  const optSale={},optCost={};
  selOpts.forEach(o=>{optSale[o.category]=(optSale[o.category]||0)+o.sale_price;optCost[o.category]=(optCost[o.category]||0)+o.cost;});
  let eqSale=0,eqCost=0;
  const equipmentLines=[...cats].map(cat=>{
    const std=eqById(stdByCat[cat]);
    const selId=(input.equipment||{})[cat]!=null?input.equipment[cat]:stdByCat[cat];
    const sel=eqById(selId);
    const sp=std?std.sale_price+std.install_cost:0;
    const selp=sel?sel.sale_price+sel.install_cost:0;
    const selc=sel?sel.cost+sel.install_cost:0;
    const ot=optSale[cat]||0, oc=optCost[cat]||0;
    eqSale+=selp+ot; eqCost+=selc+oc;
    return {category:cat,standard_equipment_name:std?std.maker+' '+std.product_name:'（標準なし）',standard_price:sp,
      equipment_id:sel?sel.id:null,equipment_name:sel?sel.maker+' '+sel.product_name:'（未選択）',selected_price:selp,option_total:ot,diff:selp+ot-sp};
  });
  const total_sale=Math.round(workSale+eqSale), total_cost=Math.round(workCost+eqCost);
  return {property:p,workLines,equipmentLines,optLines,totals:{
    total_sale,total_cost,gross_profit:total_sale-total_cost,
    gross_margin:total_sale>0?Math.round((total_sale-total_cost)/total_sale*1000)/10:0,
    diff_total:Math.round(equipmentLines.reduce((s,e)=>s+e.diff,0))}};
}

/* ---------------- analytics ---------------- */
function stats(a){if(!a.length)return{avg:0,median:0,max:0,min:0,count:0};const s=[...a].sort((x,y)=>x-y);const sum=s.reduce((p,c)=>p+c,0);const m=Math.floor(s.length/2);const med=s.length%2?s[m]:(s[m-1]+s[m])/2;return{avg:Math.round(sum/s.length),median:Math.round(med),max:s[s.length-1],min:s[0],count:s.length};}
function analytics(){
  const by={};
  DB.pastEstimates.filter(r=>r.unit_price>0).forEach(r=>{(by[r.work_item]=by[r.work_item]||[]).push({price:r.unit_price,date:r.created_date||''})});
  return Object.entries(by).map(([work_item,list])=>{
    const prices=list.map(l=>l.price);
    const sd=[...list].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
    const oldest=sd[0],latest=sd[sd.length-1];
    const rate=oldest.price>0?(latest.price-oldest.price)/oldest.price*100:0;
    return {work_item,...stats(prices),latest:latest.price,latest_date:latest.date,rise_rate:Math.round(rate*10)/10};
  }).sort((a,b)=>b.count-a.count);
}

/* ---- work items（5階層：大→中→小①②③、業者単価×掛け率） ---- */
function pathOf(w){const names=[];let p=w,g=0;while(p&&g++<20){names.unshift(p.name);p=p.parent_id?DB.workItems.find(x=>x.id===p.parent_id):null;}return names.join(' ＞ ');}
function vWorkItems(){
  ensureSort();
  const bs=(a,b)=>(a.sort||0)-(b.sort||0);
  const mv=id=>`<span class="lnk" title="上へ" onclick="wiMove(${id},-1)">▲</span> <span class="lnk" title="下へ" onclick="wiMove(${id},1)">▼</span>`;
  const baseName=id=>{const b=DB.bases.find(x=>x.id===id);return b?b.name:'';};
  const badge={1:'b-blue',2:'b-sky'};
  function node(w,depth){
    const kids=DB.workItems.filter(x=>x.parent_id===w.id).sort(bs);
    const leaf=kids.length===0;
    const collapsed=WICOL.has(w.id);
    const toggle = leaf ? '<span style="display:inline-block;width:14px"></span>'
      : `<span class="lnk" style="display:inline-block;width:14px;color:#64748b" title="${collapsed?'開く':'閉じる'}" onclick="wiToggle(${w.id})">${collapsed?'▶':'▼'}</span>`;
    let costing='';
    if(leaf){
      if(w.base_id){
        const sale=Math.round((w.vendor_price||0)*(w.markup==null?1:w.markup));
        costing=`<span class="mut" style="font-size:12px">　業者 ${yen(w.vendor_price)} × 掛率 ${w.markup==null?1:w.markup} = <b style="color:#1d4ed8">売価 ${yen(sale)}/${esc(w.unit||'')}</b>　［${esc(baseName(w.base_id))}］</span>`;
      } else costing=`<span class="mut" style="font-size:12px">　（単価未設定）</span>`;
    } else {
      costing=`<span class="mut" style="font-size:12px">　${kids.length}件${collapsed?'（閉）':''}</span>`;
    }
    const addBtn = w.level<5 ? `<span class="lnk" onclick="wiAddChild(${w.id})">＋子項目</span> ・ ` : '';
    const row=`<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 12px;border-top:1px solid #f1f5f9;padding-left:${12+depth*22}px">
      <span style="min-width:0">${toggle} <span class="badge ${badge[w.level]||'b-gray'}">${LEVELNAME[w.level]||('L'+w.level)}</span> <b>${esc(w.name)}</b>${costing}</span>
      <span style="white-space:nowrap;flex-shrink:0">${mv(w.id)} ・ ${addBtn}<span class="lnk" onclick="wiEdit(${w.id})">編集</span> ${leaf?`・ <span class="lnk" style="color:var(--muted)" onclick="wiHist(${w.id})">履歴</span> `:''}・ <span class="lnk red" onclick="wiDel(${w.id})">削除</span></span></div>`;
    return row + (collapsed ? '' : kids.map(k=>node(k,depth+1)).join(''));
  }
  const majors=DB.workItems.filter(w=>w.level===1).sort(bs);
  const blocks=majors.map(m=>`<div class="card" style="margin-bottom:12px">${node(m,0)}</div>`).join('');
  const actions=`<button class="btn gh sm" onclick="wiCollapseAll(1)">すべて閉じる</button>
    <button class="btn gh sm" onclick="wiCollapseAll(0)">すべて開く</button>
    <button class="btn gh sm" onclick="wiBulkMarkup()">掛け率を一括設定</button>
    <button class="btn pri" onclick="wiAddMajor()">＋ 大項目を追加</button>`;
  return head('工事項目マスター','大項目 → 中項目 → 小項目①②③ の5階層。末端に「業者単価 × 掛け率」で売価を設定。▶▼で開閉、▲▼で並び替え、編集の「所属（移動先）」で中項目⇄小項目も移動できます。',actions)
    +blocks+(majors.length?'':'<div class="card"><div class="empty">大項目がありません。右上の「＋ 大項目を追加」から登録してください。</div></div>');
}

function wiBulkMarkup(){
  const bs=(a,b)=>(a.sort||0)-(b.sort||0);
  const majors=DB.workItems.filter(w=>w.level===1).sort(bs);
  const opts=`<option value="all">全体（すべての工種）</option>`+

      return `<option value="maj:${m.id}">大項目: ${esc(m.name)}</option>`+
        mids.map(mid=>`<option value="mid:${mid.id}">　中項目: ${esc(m.name)} ＞ ${esc(mid.name)}</option>`).join('');
    }).join('');

    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px"><button class="btn gh" onclick="closeModal()">キャンセル</button><button class="btn pri" onclick="wiBulkMarkupApply()">一括反映</button></div>`);

function wiBulkMarkupApply(){
  const scope=document.getElementById('bm_scope').value;
  const mk=+document.getElementById('bm_markup').value; if(!(mk>0))return alert('掛け率を入力してください');
  const desc=id=>{ // id配下の全子孫idを集める
    const set=new Set([id]); let ch=true;
    while(ch){ch=false;DB.workItems.forEach(w=>{if(w.parent_id!=null&&set.has(w.parent_id)&&!set.has(w.id)){set.add(w.id);ch=true;}});}
    return set;
  };
  let target;
  if(scope==='all') target=null;
  else { const [t,ids]=scope.split(':'); target=desc(+ids); }
  let n=0;
  DB.workItems.forEach(w=>{
    const leaf=!DB.workItems.some(c=>c.parent_id===w.id);
    if(!leaf||!w.base_id)return;
    if(target&&!target.has(w.id))return;
    w.markup=mk; w.updated_at=todayISO(); n++;
  });
  save(); closeModal(); render(); alert(n+' 件の工種に掛け率 '+mk+' を反映しました。');
}

function wiSubmit(mode,id,level,parent_id){
  const g=k=>document.getElementById(k);
  const name=(g('wi_name').value||'').trim(); if(!name)return alert('名称は必須です');
  const note=(g('wi_note')||{}).value||'';
  const psel=g('wi_parent');
  const newParent = level===1 ? null : (psel&&psel.value?+psel.value:parent_id);
  const base_id = g('wi_base').value?+g('wi_base').value:'';
  const unit=g('wi_unit').value||'';
  const vendor=+g('wi_vendor').value||0, markup=g('wi_markup').value===''?1:+g('wi_markup').value;
  if(mode==='edit'){
    const c=DB.workItems.find(x=>x.id===id);
    if((c.vendor_price||0)!==vendor){DB.priceHistory.push({id:uid(),work_item_id:c.id,name:c.name,old_price:c.vendor_price||0,new_price:vendor,old_cost:c.vendor_price||0,new_cost:vendor,reason:'業者単価 改定',changed_at:todayISO()});}
    const moved=c.parent_id!==newParent;
    Object.assign(c,{name,note,base_id,unit,vendor_price:vendor,markup,parent_id:newParent,updated_at:todayISO()});
    if(moved)c.sort=nextSort(level,newParent);
  } else {
    DB.workItems.push({id:uid(),parent_id:newParent,level,name,note,base_id,unit,vendor_price:vendor,markup,sort:nextSort(level,newParent),updated_at:todayISO()});
  }
  save();closeModal();render();
}
function wiDel(id){
  const it=DB.workItems.find(x=>x.id===id); if(!it)return;
  const lname=LEVELNAME[it.level]||'項目';
  const hasKids=DB.workItems.some(w=>w.parent_id===id);
  if(!confirm(lname+'「'+it.name+'」'+(hasKids?'と、その下位項目すべて':'')+'を削除します。よろしいですか？'))return;
  const del=new Set([id]); let ch=true;
  while(ch){ch=false;DB.workItems.forEach(w=>{if(w.parent_id!=null&&del.has(w.parent_id)&&!del.has(w.id)){del.add(w.id);ch=true;}});}
  DB.workItems=DB.workItems.filter(w=>!del.has(w.id));

function wiHist(id){

// 並び順: 各兄弟グループ(同じlevel+親)に連番のsortを付与
function ensureSort(){
  const g={};
  DB.workItems.forEach(w=>{const k=w.level+'|'+w.parent_id;(g[k]=g[k]||[]).push(w);});
  Object.values(g).forEach(a=>{a.sort((x,y)=>{const sx=x.sort==null?1e9:x.sort,sy=y.sort==null?1e9:y.sort;return sx-sy;});a.forEach((w,i)=>w.sort=i);});
}
function nextSort(level,parent){const s=DB.workItems.filter(w=>w.level===level&&w.parent_id===parent).map(w=>w.sort||0);return s.length?Math.max(...s)+1:0;}
function wiMove(id,dir){
  const it=DB.workItems.find(x=>x.id===id); if(!it)return;
  const sibs=DB.workItems.filter(x=>x.level===it.level&&x.parent_id===it.parent_id).sort((a,b)=>(a.sort||0)-(b.sort||0));
  const i=sibs.findIndex(x=>x.id===id), j=i+dir;
  if(j<0||j>=sibs.length)return;
  const t=sibs[i].sort; sibs[i].sort=sibs[j].sort; sibs[j].sort=t;
  save();render();
}

function impGuess(){

function vImport(){

function impParseText(t){

}
async function impExcel(input){

// --- PDF表抽出（ヘッダー基準の列割り当て：複数業者・異なるレイアウトに対応） ---
function pdfNumOf(v){return +String(v||'').replace(/[^0-9.\-]/g,'')||0;}
function pdfClassify(s){const t=String(s).replace(/\s/g,'');
  if(/(内容|工事内容|品名|名称|摘要|工種|項目|仕様|区分)/.test(t))return'name';
  if(/(数量|員数|本数)/.test(t)||t==='数')return'qty';
  if(/単位/.test(t)||t==='位')return'unit';
  if(/単価/.test(t))return'price';
  if(/(金額|価格)/.test(t))return'amount';
  if(/備考/.test(t))return'note';
  return'ignore';}
function pdfClusterLines(items,tol){const its=items.filter(it=>it.s&&it.s.trim()).sort((a,b)=>b.y-a.y);const lines=[];let cur=null;
  its.forEach(it=>{if(cur&&Math.abs(it.y-cur.y)<=tol){cur.items.push(it);}else{cur={y:it.y,items:[it]};lines.push(cur);}});
  lines.forEach(l=>l.items.sort((a,b)=>a.x-b.x));return lines;}
function pdfIsHeader(line){const roles=new Set(line.items.map(it=>pdfClassify(it.s)));let c=0;['name','qty','unit','price','amount'].forEach(r=>{if(roles.has(r))c++;});return c>=2&&(roles.has('qty')||roles.has('amount'))&&(roles.has('price')||roles.has('amount'));}
function pdfHeaderCols(line){const cols=line.items.map(it=>({x:it.x,role:pdfClassify(it.s),label:String(it.s).replace(/\s/g,'')}));cols.sort((a,b)=>a.x-b.x);
  if(!cols.some(c=>c.role==='name')){const cand=cols.find(c=>c.role==='ignore'&&!/^(no\.?|№|番号)$/i.test(c.label));if(cand)cand.role='name';}return cols;}
function pdfAssignRow(line,cols){const buf=cols.map(()=> '');
  line.items.forEach(it=>{let bi=0,best=1e9;cols.forEach((c,i)=>{const d=Math.abs(it.x-c.x);if(d<best){best=d;bi=i;}});buf[bi]+=it.s;});
  const row={name:'',unit:'',qty:0,price:0,amount:0};
  cols.forEach((c,i)=>{const v=buf[i].trim();if(!v)return;
    if(c.role==='name')row.name+=(row.name?' ':'')+v;else if(c.role==='unit')row.unit+=v;
    else if(c.role==='qty')row.qty=pdfNumOf(v);else if(c.role==='price')row.price=pdfNumOf(v);
    else if(c.role==='amount')row.amount=pdfNumOf(v);});
  return row;}
const PDF_SKIP=/^(小計|合計|消費税|御見積|見積金額|総額|値引額|備考|調整|税抜|税込|端数|合\s*計|計$)/;
async function impPDF(input){
  const f=input.files[0]; if(!f)return; input.value='';
  try{ await ensurePDF(); }catch(e){ alert('PDF解析用の部品を取得できませんでした（オフラインの可能性）。PDFの表を選択コピーして貼り付け欄をご利用ください。'); return; }
  try{
    const pdf=await pdfjsLib.getDocument({data:new Uint8Array(await f.arrayBuffer())}).promise;
    const out=[];
    for(let pn=1;pn<=pdf.numPages;pn++){
      const page=await pdf.getPage(pn);
      const tc=await page.getTextContent();
      const items=tc.items.map(it=>({x:it.transform[4],y:it.transform[5],w:it.width||0,s:it.str}));
      const lines=pdfClusterLines(items,4);
      let cols=null;
      lines.forEach(line=>{
        if(pdfIsHeader(line)){cols=pdfHeaderCols(line);return;}
        if(!cols)return;
        const r=pdfAssignRow(line,cols);
        const nm=r.name.replace(/[（(].*?[）)]/g,'').trim();
        if(!nm||PDF_SKIP.test(nm))return;
        if(!(r.qty||r.price||r.amount))return;
        out.push([nm, r.unit, r.qty||'', r.price||'', r.amount||'']);
      });
    }
    if(!out.length){alert('表を自動抽出できませんでした（特殊なレイアウト/画像PDFの可能性）。PDFの表を選択コピーして貼り付け欄をご利用ください。');return;}
    IMP.rows=out; IMP.map={0:'工種名',1:'単位',2:'数量',3:'業者単価',4:'金額'};
    render();
  }catch(e){ alert('PDFの読み込みに失敗しました: '+e.message); }
}
function impRun(){
  const parentId=IMP.parent; const parent=DB.workItems.find(w=>w.id===parentId);
  if(!parent){alert('取込先（大項目/中項目）を選んでください');return;}
  const childLevel=Math.min(5,parent.level+1);
  const defBase=document.getElementById('imp_base').value?+document.getElementById('imp_base').value:'';
  const defMarkup=+document.getElementById('imp_markup').value||1;
  const mode=document.getElementById('imp_mode').value;
  const colOf=role=>{for(const i in IMP.map)if(IMP.map[i]===role)return +i;return -1;};
  const cName=colOf('工種名'),cUnit=colOf('単位'),cVendor=colOf('業者単価'),cQty=colOf('数量'),cAmount=colOf('金額'),cMarkup=colOf('掛け率');
  if(cName<0)return alert('「工種名」の列を指定してください');
  if(cVendor<0 && !(cQty>=0&&cAmount>=0))return alert('「業者単価」の列、または「数量」と「金額」の両方を指定してください');
  const numOf=v=>+String(v||'').replace(/[^0-9.\-]/g,'')||0;
  const HEAD=['工種名','名称','工種','項目','品名','名前'];
  let added=0,updated=0;
  IMP.rows.forEach(r=>{
    const name=(r[cName]||'').trim(); if(!name||HEAD.includes(name))return;
    let vendor=cVendor>=0?Math.round(numOf(r[cVendor])):0;
    const qty=cQty>=0?numOf(r[cQty]):0, amount=cAmount>=0?numOf(r[cAmount]):0;
    if(!vendor && qty>0 && amount>0) vendor=Math.round(amount/qty); // 単価が無ければ 金額÷数量 で算出
    const unit=cUnit>=0?(r[cUnit]||''):'';
    const markup=cMarkup>=0?(numOf(r[cMarkup])||defMarkup):defMarkup;
    const refNote=(qty>0||amount>0)?`取込時 数量${qty||'-'} / 金額${amount? yen(amount):'-'}`:'';
    if(mode==='update'){
      const ex=DB.workItems.find(w=>w.name===name && isLeaf(w));
      if(ex){ if((ex.vendor_price||0)!==vendor){DB.priceHistory.push({id:uid(),work_item_id:ex.id,name:ex.name,old_price:ex.vendor_price||0,new_price:vendor,old_cost:ex.vendor_price||0,new_cost:vendor,reason:'取込更新',changed_at:todayISO()});} ex.vendor_price=vendor; if(cUnit>=0)ex.unit=unit; if(cMarkup>=0)ex.markup=markup; if(refNote)ex.note=refNote; ex.updated_at=todayISO(); updated++; }
    } else {
      DB.workItems.push({id:uid(),parent_id:parentId,level:childLevel,name,unit,base_id:defBase,vendor_price:vendor,markup,sort:nextSort(childLevel,parentId),note:refNote,updated_at:todayISO()});
      added++;
    }
  });
  save(); IMP.rows=[]; alert('取込完了：追加 '+added+' 件 / 更新 '+updated+' 件（取込先: '+parent.name+'）');
  state.view='workitems'; render();
}

function pastDel(id){DB.pastEstimates=DB.pastEstimates.filter(x=>x.id!==id);save();render();}
const CSV_MAP={物件名:'property_name',延床面積:'total_floor_area',工事項目:'work_item',明細:'detail',数量:'quantity',単価:'unit_price',金額:'amount',作成日:'created_date'};
function csvImport(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    const text=String(reader.result).replace(/^﻿/,'');
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){alert('データがありません');return;}
    const headers=lines[0].split(',').map(h=>CSV_MAP[h.trim()]||h.trim());
    let n=0;
    lines.slice(1).forEach(line=>{
      const c=line.split(','); const r={}; headers.forEach((h,i)=>r[h]=(c[i]||'').trim());
      if(!r.work_item&&!r.property_name)return;
      const q=+r.quantity||0,up=+r.unit_price||0;
      DB.pastEstimates.push({id:uid(),property_name:r.property_name||'',total_floor_area:+r.total_floor_area||0,work_item:r.work_item||'',detail:r.detail||'',quantity:q,unit_price:up,amount:r.amount?+r.amount:q*up,created_date:r.created_date||''});
      n++;
    });
    save();input.value='';alert(n+' 件を取り込みました');render();
  };
  reader.readAsText(file,'utf-8');
}
function csvTemplate(){
  const csv='﻿物件名,延床面積,工事項目,明細,数量,単価,金額,作成日\nサンプル邸,105,基礎工事,ベタ基礎,56,28000,1568000,2025-06-01';
  downloadFile('past_estimates_template.csv',csv,'text/csv');
}

     :`<p class="note">このブラウザは「直接ファイル保存」に未対応です（Safari / Firefox など）。下の「エクスポート / インポート」をお使いください。Chrome または Edge なら直接保存が使えます。</p>`}
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
    <div style="font-weight:700;margin-bottom:6px">エクスポート / インポート（どのブラウザでも可）</div>
    <p class="mut" style="font-size:12px;margin:0 0 12px">全データを1つのJSONファイルとして保存／読み込みします。バックアップや別PC・スマホへの移行に使います。</p>
    <button class="btn gh" onclick="exportData()">📥 ファイルに書き出す</button>
    <button class="btn gh" onclick="document.getElementById('jsonfile').click()">📤 ファイルから読み込む</button>
    <input id="jsonfile" type="file" accept=".json" style="display:none" onchange="importData(this)">
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
    <div style="font-weight:700;margin-bottom:6px">サンプルデータ</div>
    <p class="mut" style="font-size:12px;margin:0 0 12px">動作確認用のサンプル（顧客・物件・工事項目など）を読み込みます。現在のデータは置き換わります。</p>
    <button class="btn gh" onclick="loadSample()">📦 サンプルデータを読み込む</button>
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
    <div style="font-weight:700;margin-bottom:6px;color:var(--red)">全データを空にする</div>
    <p class="mut" style="font-size:12px;margin:0 0 12px">すべてのデータ（顧客・物件・各マスター・概算・過去見積）を削除して空にします。自分のデータをゼロから入力するときに使います。<b>取り消せません。</b></p>
    <button class="btn dn" onclick="clearAll()">🗑 全データを空にする</button>
  </div></div>`;
}
function exportData(){downloadFile('housing_estimate_backup_'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify(DB,null,2),'application/json');}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{try{const o=JSON.parse(reader.result);if(!o.properties||!o.workItems)throw 0;DB=o;save();input.value='';alert('インポートしました');state.view='dashboard';render();}catch(e){alert('読み込めませんでした。正しいバックアップJSONを選んでください。');}};
  reader.readAsText(file,'utf-8');
}
function downloadFile(name,content,type){
  const blob=new Blob([content],{type:type+';charset=utf-8'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}

/* ---- boot ---- */
load();render();fileBoot();
</script>
</body>
