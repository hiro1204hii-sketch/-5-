# Render Blueprint — GitHub連携でワンクリック近くデプロイできる設定。
# Render(https://render.com) で New → Blueprint → このリポジトリを選択すると、
# 下記の単一Webサービスが作成される。ビルド済みフロントもバックが配信するため、URLは1つ。
services:
  - type: web
    name: housing-estimate-system
    runtime: node
    plan: free
    rootDir: housing-estimate-system
    buildCommand: npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # SQLiteのDBファイル位置（無料プランはディスク非永続のため、再起動で初期データに戻る）
      - key: DB_PATH
        value: /tmp/housing.db
